name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/deploy-website.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'website/**'
      - 'docs/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            website/package-lock.json
            docs/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Build the React website (root path)
      - name: Install website dependencies
        run: cd website && npm ci

      - name: Build website
        run: cd website && npm run build

      # Build the VitePress API docs (/docs subpath)
      - name: Install docs dependencies
        run: cd docs && npm ci

      - name: Build API docs
        run: cd docs && npm run docs:build

      # Merge both into a single deployment directory
      - name: Assemble deployment
        run: |
          mkdir -p deploy
          # React website goes to root
          cp -r website/dist/* deploy/
          # VitePress API docs go to /docs subpath
          cp -r docs/.vitepress/dist deploy/docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
