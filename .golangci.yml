version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

issues:
  exclude-rules:
    # CLI commands commonly use os.Exit in Run functions
    - path: cmd/cvss-cli/
      linters:
        - revive
      text: "calls to os.Exit"

run:
  timeout: 5m
  go: "1.21"
