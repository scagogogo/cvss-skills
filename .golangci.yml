linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck

linters-settings:
  errcheck:
    # Ignore error checks on these common functions where error handling is optional
    exclude-functions:
      - (github.com/spf13/cobra.Command).MarkFlagRequired

issues:
  exclude-rules:
    # CLI commands commonly use os.Exit in Run functions
    - path: cmd/cvss-cli/
      linters:
        - revive
      text: "calls to os.Exit"
    # Defensive nil-check before range is acceptable
    - linters:
        - gosimple
      text: "S1031"

run:
  timeout: 5m
